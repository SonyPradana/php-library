name: Redis

on:
  push:
    paths:
      - ".github/workflows/redis.yml"
      - "src/System/Redis/**"
      - "tests/Redis/**"
    branches:
      - master
  pull_request:
    paths:
      - ".github/workflows/redis.yml"
      - "src/System/Redis/**"
      - "tests/Redis/**"

jobs:
  tests:
    runs-on: ubuntu-24.04
    name: PHP 8.1

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, redis
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: vendor/bin/phpunit tests/Redis
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
