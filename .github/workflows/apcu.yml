name: APCu

on:
  push:
    paths:
      - ".github/workflows/apcu.yml"
      - "src/System/Cache/Storage/ApcuStorage.php"
      - "tests/Cache/Storage/ApcuStorageTest.php"
    branches:
      - master
  pull_request:
    paths:
      - ".github/workflows/apcu.yml"
      - "src/System/Cache/Storage/ApcuStorage.php"
      - "tests/Cache/Storage/ApcuStorageTest.php"

jobs:
  tests:
    runs-on: ubuntu-latest
    name: PHP APCu

    strategy:
      fail-fast: false
      matrix:
        php: 8.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, apcu
          ini-values: apc.enable_cli=1
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: vendor/bin/phpunit --group apcu --testdox
